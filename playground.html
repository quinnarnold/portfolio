<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Network Playground — Quinn Arnold</title>
  <meta name="description" content="Interactive neural network playground — build, train, and visualize neural networks in real time.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <header class="nav" id="nav"></header>

  <main id="main">
  <div class="page-header">
    <div class="container">
      <a href="demos.html" class="pg-back-link">Back to Demos</a>
      <p class="section-label">Interactive Demo</p>
      <h1>Neural Network Playground</h1>
      <p class="section-subtitle">Build a small neural network, pick a dataset, and watch the decision boundary evolve as it trains.</p>
    </div>
  </div>

  <section class="playground-section">
    <div class="container">

      <div class="pg-controls">
        <div class="pg-control-group">
          <label class="pg-label">Dataset</label>
          <div class="pg-dataset-btns">
            <button class="pg-dataset-btn active" data-dataset="circle">Circle</button>
            <button class="pg-dataset-btn" data-dataset="xor">XOR</button>
            <button class="pg-dataset-btn" data-dataset="spiral">Spiral</button>
            <button class="pg-dataset-btn" data-dataset="gaussian">Gaussian</button>
          </div>
        </div>

        <div class="pg-control-group">
          <label class="pg-label">Hidden Layers</label>
          <div class="pg-layer-btns">
            <button class="pg-btn-sm" id="remove-layer">- Layer</button>
            <button class="pg-btn-sm" id="add-layer">+ Layer</button>
          </div>
          <div class="pg-layer-neurons" id="layer-neurons"></div>
        </div>

        <div class="pg-control-group">
          <label class="pg-label" for="activation-select">Activation</label>
          <select id="activation-select" class="pg-select">
            <option value="relu">ReLU</option>
            <option value="tanh">Tanh</option>
            <option value="sigmoid">Sigmoid</option>
          </select>
        </div>

        <div class="pg-control-group">
          <label class="pg-label" for="lr-slider">Learning Rate</label>
          <input type="range" id="lr-slider" class="pg-slider" min="-3" max="0" step="0.1" value="-1.5">
          <span class="pg-lr-value mono" id="lr-value">0.0316</span>
        </div>

        <div class="pg-control-group">
          <label class="pg-label">Controls</label>
          <div class="pg-playback">
            <button class="btn btn-primary btn-sm" id="btn-play">Play</button>
            <button class="btn btn-outline btn-sm" id="btn-step">Step</button>
            <button class="btn btn-outline btn-sm" id="btn-reset">Reset</button>
          </div>
        </div>

        <div class="pg-control-group pg-stats">
          <div class="pg-stat">
            <span class="pg-label">Epoch</span>
            <span class="pg-stat-value mono" id="stat-epoch">0</span>
          </div>
          <div class="pg-stat">
            <span class="pg-label">Loss</span>
            <span class="pg-stat-value mono" id="stat-loss">0.0000</span>
          </div>
        </div>
      </div>

      <div class="pg-canvases">
        <div class="pg-canvas-wrap">
          <div class="pg-canvas-label mono">Decision Boundary</div>
          <div class="pg-canvas-container">
            <canvas id="boundary-canvas"></canvas>
          </div>
        </div>
        <div class="pg-canvas-wrap">
          <div class="pg-canvas-label mono">Network Architecture</div>
          <div class="pg-canvas-container">
            <canvas id="diagram-canvas"></canvas>
          </div>
        </div>
      </div>

    </div>
  </section>

  </main>

  <footer class="footer" id="footer"></footer>

  <script src="js/components.js"></script>
  <script src="js/nav-toggle.js"></script>
  <script src="js/theme-toggle.js"></script>
  <script src="js/playground.js"></script>
</body>
</html>
